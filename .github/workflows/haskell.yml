name: Haskell CI

on:
  push:
    branches: [main]
    paths:
      - 'automaton-designer/**'
      - '.github/workflows/haskell.yml'
  pull_request:
    branches: [main]
    paths:
      - 'automaton-designer/**'
      - '.github/workflows/haskell.yml'

defaults:
  run:
    working-directory: automaton-designer

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ghc: ['9.8', '9.10']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: latest

      - name: Cache Cabal
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            automaton-designer/dist-newstyle
          key: ${{ runner.os }}-ghc-${{ matrix.ghc }}-${{ hashFiles('automaton-designer/automaton-designer.cabal', 'automaton-designer/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ matrix.ghc }}-

      - name: Install dependencies
        run: cabal update && cabal build --only-dependencies --enable-tests

      - name: Build
        run: cabal build all

      - name: Run tests
        run: cabal test --test-show-details=direct
