name: Haskell CI

on:
  push:
    branches: [main]
    paths:
      - 'automaton-designer/**'
      - '.github/workflows/haskell.yml'
  pull_request:
    branches: [main]
    paths:
      - 'automaton-designer/**'
      - '.github/workflows/haskell.yml'

defaults:
  run:
    working-directory: automaton-designer

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ghc: ['9.8', '9.10']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: latest

      - name: Cache Cabal
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            automaton-designer/dist-newstyle
          key: ${{ runner.os }}-ghc-${{ matrix.ghc }}-${{ hashFiles('automaton-designer/automaton-designer.cabal', 'automaton-designer/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ matrix.ghc }}-

      - name: Install dependencies
        run: cabal update && cabal build --only-dependencies --enable-tests

      - name: Build
        run: cabal build all

      - name: Run tests
        run: cabal test --test-show-details=direct

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/automaton-designer
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: automaton-designer
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image as artifact
        run: |
          docker pull ghcr.io/${{ github.repository }}/automaton-designer:latest
          docker save ghcr.io/${{ github.repository }}/automaton-designer:latest | gzip > /tmp/automaton-designer.tar.gz
        working-directory: .

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/automaton-designer.tar.gz
          retention-days: 30
