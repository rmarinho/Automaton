<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <!-- Foreground: automaton graph using only basic shapes (no text/filters) -->

  <!-- Transition arrows -->
  <!-- q0 → q1 -->
  <line x1="200" y1="160" x2="280" y2="160" stroke="#585b70" stroke-width="5"/>
  <polygon points="280,160 266,152 266,168" fill="#585b70"/>

  <!-- q1 → q2 -->
  <line x1="310" y1="198" x2="260" y2="278" stroke="#585b70" stroke-width="5"/>
  <polygon points="260,278 272,272 256,268" fill="#585b70"/>

  <!-- q2 → q0 -->
  <path d="M 200,300 Q 120,240 162,195" fill="none" stroke="#585b70" stroke-width="5"/>
  <polygon points="162,195 154,210 170,206" fill="#585b70"/>

  <!-- Start arrow into q0 -->
  <line x1="76" y1="170" x2="120" y2="170" stroke="#89b4fa" stroke-width="6"/>
  <polygon points="120,170 106,162 106,178" fill="#89b4fa"/>

  <!-- State q0 (start) - blue ring -->
  <circle cx="160" cy="170" r="42" fill="#313244"/>
  <circle cx="160" cy="170" r="42" fill="none" stroke="#89b4fa" stroke-width="5"/>

  <!-- State q1 - white ring -->
  <circle cx="310" cy="170" r="42" fill="#313244"/>
  <circle cx="310" cy="170" r="42" fill="none" stroke="#cdd6f4" stroke-width="4"/>

  <!-- State q2 (accept) - green ring + inner yellow ring -->
  <circle cx="228" cy="310" r="42" fill="#313244"/>
  <circle cx="228" cy="310" r="42" fill="none" stroke="#a6e3a1" stroke-width="5"/>
  <circle cx="228" cy="310" r="32" fill="none" stroke="#f9e2af" stroke-width="3.5"/>
</svg>