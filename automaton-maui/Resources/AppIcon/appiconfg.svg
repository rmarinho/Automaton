<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filter for active feel -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Transition arrows (drawn first, behind nodes) -->
  <!-- q0 → q1 -->
  <line x1="188" y1="155" x2="268" y2="155" stroke="#585b70" stroke-width="3"/>
  <polygon points="268,155 258,149 258,161" fill="#585b70"/>
  <text x="228" y="143" fill="#a6adc8" font-family="sans-serif" font-size="22"
        text-anchor="middle" font-weight="bold">a</text>

  <!-- q1 → q2 -->
  <line x1="293" y1="195" x2="253" y2="275" stroke="#585b70" stroke-width="3"/>
  <polygon points="253,275 262,268 249,266" fill="#585b70"/>
  <text x="286" y="242" fill="#a6adc8" font-family="sans-serif" font-size="22"
        text-anchor="middle" font-weight="bold">b</text>

  <!-- q2 → q0 (curved) -->
  <path d="M 198 290 Q 130 230 165 185" fill="none" stroke="#585b70" stroke-width="3"/>
  <polygon points="165,185 159,196 171,194" fill="#585b70"/>
  <text x="145" y="242" fill="#a6adc8" font-family="sans-serif" font-size="22"
        text-anchor="middle" font-weight="bold">a</text>

  <!-- Start arrow for q0 -->
  <line x1="88" y1="165" x2="118" y2="165" stroke="#89b4fa" stroke-width="3.5"/>
  <polygon points="118,165 108,159 108,171" fill="#89b4fa"/>

  <!-- State q0 (start) -->
  <circle cx="155" cy="165" r="38" fill="#313244" stroke="#89b4fa" stroke-width="3.5" filter="url(#glow)"/>
  <text x="155" y="173" fill="#cdd6f4" font-family="sans-serif" font-size="26"
        text-anchor="middle" font-weight="bold">q₀</text>

  <!-- State q1 -->
  <circle cx="305" cy="165" r="38" fill="#313244" stroke="#cdd6f4" stroke-width="3"/>
  <text x="305" y="173" fill="#cdd6f4" font-family="sans-serif" font-size="26"
        text-anchor="middle" font-weight="bold">q₁</text>

  <!-- State q2 (accept — double circle) -->
  <circle cx="228" cy="300" r="38" fill="#313244" stroke="#a6e3a1" stroke-width="3.5" filter="url(#glow)"/>
  <circle cx="228" cy="300" r="30" fill="none" stroke="#f9e2af" stroke-width="2.5"/>
  <text x="228" y="308" fill="#cdd6f4" font-family="sans-serif" font-size="26"
        text-anchor="middle" font-weight="bold">q₂</text>
</svg>